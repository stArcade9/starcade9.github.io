  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020010; }
    canvas { display: block; width: 100%; height: 100%; }

  <script>
    // Inject viewport dimensions + clear color into the URL so main.js picks them up
    (function() {
      var qs = new URLSearchParams(window.location.search);
      var changed = false;
      if (!qs.has('w'))  { qs.set('w', String(window.innerWidth)); changed = true; }
      if (!qs.has('h'))  { qs.set('h', String(window.innerHeight)); changed = true; }
      if (!qs.has('clearColor')) { qs.set('clearColor', '0x020010'); changed = true; }
      if (!qs.has('demo')) { qs.set('demo', 'hero-demo'); changed = true; }
      if (changed) {
        window.history.replaceState(null, '', '?' + qs.toString());
      }
    })();
  </script>
