<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nova64 Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #090a0f;
        --text: #e2e8f0;
        --accent: #0ea5e9;
        --border: rgba(255, 255, 255, 0.1);
      }
      html,
      body {
        background: var(--bg);
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        background-image:
          radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.05) 0%, transparent 50%);
      }

      .shell {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        min-height: 100vh;
        box-sizing: border-box;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        background: radial-gradient(circle, #1a1e29 0%, #090a0f 100%);
      }

      /* CRT Hardware Wrapper */
      .hardware-bezel {
        background: linear-gradient(145deg, #2a2a2a, #0a0a0a);
        padding: 30px 30px 50px 30px;
        border-radius: 20px;
        box-shadow:
          0 0 0 2px #444,
          0 25px 50px -12px rgba(0, 0, 0, 0.8),
          inset 0 4px 6px rgba(255, 255, 255, 0.1),
          inset 0 -4px 6px rgba(0, 0, 0, 0.8);
        position: relative;
      }

      .hardware-brand {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'VT323', monospace;
        color: #888;
        font-size: 28px;
        letter-spacing: 6px;
        text-shadow:
          0 -1px 0 rgba(0, 0, 0, 0.9),
          0 1px 0 rgba(255, 255, 255, 0.2);
        font-weight: bold;
      }

      .screen-container {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        border: 4px solid #050505;
        box-shadow:
          inset 0 0 40px rgba(0, 0, 0, 0.9),
          0 0 10px rgba(14, 165, 233, 0.4);
        background: #000;
        border-radius: 2% / 3%;
      }

      canvas {
        image-rendering: auto;
        width: 1280px;
        height: 720px;
        background: #000;
        display: block;
        max-width: 100%;
        height: auto;
        touch-action: none;
        -webkit-touch-callout: none;
      }

      /* CRT Scanline Overlay */
      .scanlines {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.03),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.03)
          );
        background-size:
          100% 4px,
          3px 100%;
        pointer-events: none;
        z-index: 10;
        opacity: 0.8;
      }

      .screen-glare {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          120% 120% at 30% 10%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 50%
        );
        pointer-events: none;
        z-index: 11;
        mix-blend-mode: screen;
      }

      /* Hide standard canvas outline since we use hardware bezel */
      #screen {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.182.0",
        "three/tsl": "https://esm.sh/three@0.182.0/tsl",
        "three/webgpu": "https://esm.sh/three@0.182.0/webgpu",
        "three/examples/jsm/": "https://esm.sh/three@0.182.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" crossorigin src="./assets/main-DZ5KAIoL.js"></script>
  </head>
  <body>
    <div class="shell">
      <div class="stage">
        <div class="hardware-bezel">
          <div class="screen-container">
            <canvas id="screen" width="1280" height="720"></canvas>
            <div class="scanlines"></div>
            <div class="screen-glare"></div>
          </div>
          <div class="hardware-brand">NOVA-64</div>
        </div>
      </div>
    </div>


  </body>
</html>
