<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NOVA-64 Console</title>
    <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root { 
        --bg: #090a0f; 
        --panel: rgba(21, 24, 34, 0.85); 
        --text: #e2e8f0; 
        --muted: #94a3b8; 
        --accent: #0ea5e9;
        --accent-hover: #38bdf8;
        --neon: #f43f5e;
        --border: rgba(255, 255, 255, 0.1);
        --glass: rgba(255, 255, 255, 0.05);
      }
      html, body {
        background: var(--bg);
        margin: 0;
        height: 100vh;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        background-image: 
          radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.05) 0%, transparent 50%);
      }
      
      .shell { 
        display: grid; 
        grid-template-columns: 1fr 340px; 
        gap: 0; 
        height: 100%; 
        box-sizing: border-box; 
      }
      
      .stage { 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center;
        padding: 20px;
        position: relative;
        background: radial-gradient(circle, #1a1e29 0%, #090a0f 100%);
      }

      /* CRT Hardware Wrapper */
      .hardware-bezel {
        background: linear-gradient(145deg, #2a2a2a, #0a0a0a);
        padding: 30px 30px 50px 30px;
        border-radius: 20px;
        box-shadow: 
          0 0 0 2px #444,
          0 25px 50px -12px rgba(0,0,0,0.8),
          inset 0 4px 6px rgba(255,255,255,0.1),
          inset 0 -4px 6px rgba(0,0,0,0.8);
        position: relative;
      }
      
      .hardware-brand {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'VT323', monospace;
        color: #888;
        font-size: 28px;
        letter-spacing: 6px;
        text-shadow: 0 -1px 0 rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.2);
        font-weight: bold;
      }

      .screen-container {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        border: 4px solid #050505;
        box-shadow: 
          inset 0 0 40px rgba(0,0,0,0.9),
          0 0 10px rgba(14, 165, 233, 0.4);
        background: #000;
        /* Simulate TV curve slightly */
        border-radius: 2% / 3%;
      }

      canvas {
        image-rendering: auto; 
        width: 1280px; 
        height: 720px;
        background: #000; 
        display: block;
        max-width: 100%;
        height: auto;
      }

      /* CRT Scanline Overlay */
      .scanlines {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        z-index: 10;
        opacity: 0.8;
      }
      
      .screen-glare {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(120% 120% at 30% 10%, rgba(255,255,255,0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: 11;
        mix-blend-mode: screen;
      }

      .panel { 
        background: var(--panel); 
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-left: 1px solid var(--border); 
        padding: 30px 24px; 
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.6);
        overflow-y: auto;
        z-index: 20;
      }

      .row { 
        display: flex; 
        gap: 12px; 
        align-items: center; 
        flex-wrap: wrap; 
      }
      
      .col {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }

      label { 
        font-size: 11px; 
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 700;
        color: var(--muted); 
      }

      select, button {
        background: var(--glass); 
        color: var(--text); 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        padding: 10px 14px; 
        font-size: 13px;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
      }

      select { 
        width: 100%; 
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 16px;
        padding-right: 40px;
      }
      
      select:hover, select:focus {
        border-color: var(--accent);
        outline: none;
        background-color: rgba(255,255,255,0.1);
      }

      select option {
        background: #1e2532;
        color: #fff;
      }

      button { 
        cursor: pointer; 
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      
      button:hover { 
        background: rgba(255, 255, 255, 0.1); 
        transform: translateY(-1px);
      }
      
      button:active {
        transform: translateY(1px);
      }

      .btn-primary {
        background: rgba(14, 165, 233, 0.15);
        color: var(--accent);
        border: 1px solid rgba(14, 165, 233, 0.3);
      }
      .btn-primary:hover {
        background: rgba(14, 165, 233, 0.25);
        border-color: var(--accent);
      }

      .btn-magic {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(217, 70, 239, 0.2) 100%);
        border: 1px solid rgba(217, 70, 239, 0.4);
        color: #f0abfc;
      }
      
      .btn-magic:hover {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.3) 0%, rgba(217, 70, 239, 0.3) 100%);
        border-color: rgba(217, 70, 239, 0.6);
        box-shadow: 0 4px 15px rgba(217, 70, 239, 0.2);
      }

      .hr { 
        height: 1px; 
        background: var(--border); 
        margin: 4px 0; 
      }
      
      .stat-box {
        background: #000;
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #333;
        font-family: 'VT323', monospace;
        font-size: 18px;
        color: #10b981;
        letter-spacing: 1px;
        text-shadow: 0 0 5px rgba(16, 185, 129, 0.5);
        text-align: center;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
      }

      .title { 
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 24px; 
        color: #fff;
        margin-bottom: 4px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #0ea5e9, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .subtitle {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .footer { 
        font-size: 12px; 
        color: var(--muted); 
        margin-top: auto;
        padding-top: 20px;
        text-align: center;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: color 0.2s;
        margin-bottom: 20px;
      }
      
      .back-btn:hover {
        color: #fff;
      }

      .controls-hint {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 8px;
      }
      .key {
        display: inline-block;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 2px 6px;
        font-family: monospace;
        font-size: 11px;
        color: #cbd5e1;
        box-shadow: 0 2px 0 #0f172a;
      }
      
      /* Hide standard canvas outline since we use hardware bezel */
      #screen {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="stage">
        <div class="hardware-bezel">
          <div class="screen-container">
            <canvas id="screen" width="1280" height="720"></canvas>
            <div class="scanlines"></div>
            <div class="screen-glare"></div>
          </div>
          <div class="hardware-brand">NOVA-64</div>
        </div>
      </div>
      <div class="panel">
        <div>
          <a href="/" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            BACK TO DASHBOARD
          </a>
          <div class="title">NOVA-64 STUDIO</div>
          <div class="subtitle">Ultimate 3D Web Engine<br/>Hardware-accelerated environment</div>
        </div>
        
        <div class="hr"></div>

        <div class="stat-box">
          <span id="stats">FPS: 00 | UP: 00ms | DW: 00ms</span>
        </div>

        <div class="col">
          <label>Cartridge Selection</label>
          <select id="cart">
            <option value="/examples/space-harrier-3d/code.js">🛸 Space Harrier (2.5D Rail Shooter)</option>
            <option value="/examples/hello-3d/code.js">👋 Hello 3D World (Basic Demo)</option>
            <option value="/examples/crystal-cathedral-3d/code.js">🏛️ Crystal Cathedral (Graphics)</option>
            <option value="/examples/mystical-realm-3d/code.js">🏰 Mystical Realm (World)</option>
            <option value="/examples/star-fox-nova-3d/code.js">🚀 Star Fox Nova (Space Combat)</option>
            <option value="/examples/f-zero-nova-3d/code.js">🏁 F-Zero Nova (Racing)</option>
            <option value="/examples/cyberpunk-city-3d/code.js">🌃 Cyberpunk City (Open World)</option>
            <option value="/examples/physics-demo-3d/code.js">⚛️ Physics Lab (Simulation)</option>
            <option value="/examples/shooter-demo-3d/code.js">🔫 Space Shooter (Combat)</option>
            <option value="/examples/strider-demo-3d/code.js">⚔️ Knight Platformer (Adventure)</option>
            <option value="/examples/super-plumber-64/code.js">🍄 Super Plumber 64 (Platformer)</option>
            <option value="/examples/minecraft-demo/code.js">⛏️ Minecraft Voxel World (Sandbox)</option>
            <option value="/examples/3d-advanced/code.js">🎯 Advanced 3D (Technical)</option>
            <option value="/examples/model-viewer-3d/code.js">🦊 Animated 3D Models</option>
            <option value="/examples/demoscene/code.js">🎬 Demoscene - Tron (Showcase)</option>
          </select>
        </div>

        <div class="row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
          <button id="pause" title="Pause Engine" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            Hold
          </button>
          <button id="step" title="Step Frame" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            Step
          </button>
          <button id="shot" title="Screenshot Canvas" class="btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            Snap
          </button>
        </div>

        <div class="hr"></div>

        <div class="col">
          <label>Development Array</label>
          <button id="editor" onclick="window.open('/os9-shell/index.html?app=sprite-editor', '_blank')" class="btn-magic">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
            Asset Studio
          </button>
          <button id="os-shell" onclick="window.open('/os9-shell/index.html', '_blank')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            NovaOS Desktop
          </button>
          <button id="docs" onclick="window.open('/docs/index.html', '_blank')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            Engine Syntax
          </button>
        </div>

        <div class="footer">
          <div style="margin-bottom: 8px; color: #fff; font-weight: 600; text-transform: uppercase;">Gamepad Input</div>
          <div class="controls-hint">
            <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
            <div><span class="key">Z</span><span class="key">X</span> Button</div>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const demoParam = urlParams.get('demo');
      if (demoParam) {
        window.addEventListener('load', () => {
          const select = document.getElementById('cart');
          const demoMap = {
            'crystal-cathedral-3d': '/examples/crystal-cathedral-3d/code.js',
            'f-zero-nova-3d': '/examples/f-zero-nova-3d/code.js',
            'star-fox-nova-3d': '/examples/star-fox-nova-3d/code.js',
            'minecraft-demo': '/examples/minecraft-demo/code.js',
            'super-plumber-64': '/examples/super-plumber-64/code.js',
            'cyberpunk-city-3d': '/examples/cyberpunk-city-3d/code.js',
            'strider-demo-3d': '/examples/strider-demo-3d/code.js',
            'model-viewer-3d': '/examples/model-viewer-3d/code.js',
            'demoscene': '/examples/demoscene/code.js',
            'space-harrier-3d': '/examples/space-harrier-3d/code.js',
            'hello-3d': '/examples/hello-3d/code.js',
            'mystical-realm-3d': '/examples/mystical-realm-3d/code.js',
            'physics-demo-3d': '/examples/physics-demo-3d/code.js',
            'shooter-demo-3d': '/examples/shooter-demo-3d/code.js',
            'hello-skybox': '/examples/hello-skybox/code.js',
          };
          if (demoMap[demoParam]) {
            select.value = demoMap[demoParam];
          }
        });
      }
    </script>
  </body>
</html>
